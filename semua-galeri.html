<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Kegiatan - KOPANA Yogyakarta</title>
  <meta name="description" content="Dokumentasi lengkap foto kegiatan KOPANA Yogyakarta - RAT, kegiatan sosial, dan momen kebersamaan anggota.">
  <link rel="canonical" href="https://kopana.id/semua-galeri.html">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/logo-192.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdab9wBMeP6E5RQLmBeRNqRXE7Z9wLd0zBX8U2nqeAh8iWcLrVSt8U9bfEa7fm/LzO+g=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/style.css?v=132">

  <style>
    .arsip-container {
      max-width: 1100px;
      margin: 100px auto 60px;
      padding: 0 24px;
    }
    .arsip-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .arsip-header h1 {
      color: var(--text, #1e293b);
      margin-bottom: 10px;
    }
    .arsip-header p {
      color: var(--text-muted, #475569);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--primary, #2563eb);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted, #64748b);
      grid-column: 1 / -1;
    }
  </style>

<script>
  // Bersihkan service worker lama milik pengunjung dari versi situs sebelumnya.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(function(regs) { regs.forEach(function(r) { r.unregister(); }); })
      .catch(function() {});
  }
</script>
</head>
<body>

  <!-- ANTI-FOUC DARK MODE -->
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('kopana-dark-mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'true' || (saved === null && prefersDark)) {
          document.body.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>

  <!-- Dark Toggle Button Absolut -->
  <button id="dark-toggle" class="dark-toggle" style="position: absolute; top: 20px; right: 20px; z-index: 1000;" aria-label="Ganti tema gelap/terang">
    <i id="dark-icon" class="fas fa-moon"></i>
  </button>

  <div class="arsip-container">
    <a href="/#galeri" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Halaman Utama</a>

    <div class="arsip-header">
      <h1>Galeri Kegiatan</h1>
      <p>Dokumentasi lengkap kegiatan dan momen penting KOPANA Yogyakarta.</p>
    </div>

    <!-- Filter Galeri (tombol dibangun otomatis dari kategori foto) -->
    <div class="galeri-filter" role="group" aria-label="Filter galeri" style="margin-bottom: 30px;">
      <button class="filter-btn active" data-filter="all">Semua</button>
    </div>

    <div class="galeri-grid" id="dyn-galeri-grid">
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Memuat galeri...</p>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Lightbox galeri foto">
    <button id="lightbox-close" class="lightbox-close" aria-label="Tutup lightbox">
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
    <img id="lightbox-img" src="" alt="" class="lightbox-img">
    <p id="lightbox-caption" class="lightbox-caption"></p>
  </div>

  <script src="assets/js/script.js?v=135" defer></script>
</body>
</html>
