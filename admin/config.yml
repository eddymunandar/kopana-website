backend:
  name: github
  repo: eddymunandar/kopana-website
  branch: main
  # Sveltia CMS uses a built-in proxy automatically for GitHub auth if no base_url is specified

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "database"
    label: "Database Website"
    files:
      - name: "pengaturan"
        label: "Pengaturan Umum"
        file: "data/pengaturan.json"
        description: "Pengaturan identitas dan kontak website"
        fields:
          - { label: "Nama Koperasi", name: "nama", widget: "string", default: "KOPANA" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "Koperasi Purnakaryawan Pertamina" }
          - { label: "Deskripsi Footer", name: "deskripsi", widget: "text" }
          - { label: "Logo (Opsional)", name: "logo", widget: "image", required: false }
      - name: "pengumuman"
        label: "Popup Pengumuman"
        file: "data/pengumuman.json"
        description: "Pengaturan popup yang muncul di tengah layar"
        fields:
          - { label: "Aktifkan Popup?", name: "aktifkan", widget: "boolean", default: false }
          - { label: "Judul Pengumuman", name: "judul", widget: "string" }
          - { label: "Pesan (Bisa format tebal/miring)", name: "pesan", widget: "markdown" }
      - name: "usaha"
        label: "Bidang Usaha"
        file: "data/usaha.json"
        description: "Daftar layanan dan bidang usaha KOPANA"
        fields:
          - name: "items"
            label: "Daftar Usaha"
            widget: "list"
            fields:
              - { label: "Nama Usaha", name: "judul", widget: "string" }
              - { label: "Deskripsi", name: "deskripsi", widget: "text" }
              - { label: "Foto Utama", name: "foto", widget: "image", required: false }
      - name: "berita"
        label: "Berita & Artikel"
        file: "data/berita.json"
        description: "Daftar berita KOPANA"
        fields:
          - name: "items"
            label: "Daftar Berita"
            widget: "list"
            fields:
              - { label: "Judul", name: "judul", widget: "string" }
              - { label: "Tanggal", name: "tanggal", widget: "datetime", format: "DD MMM YYYY", date_format: "DD MMM YYYY", time_format: false, type: "date" }
              - { label: "Kategori", name: "kategori", widget: "string", default: "Berita" }
              - { label: "Penulis", name: "penulis", widget: "string", default: "Redaksi KOPANA" }
              - { label: "Ringkasan", name: "ringkasan", widget: "text" }
              - { label: "Foto Utama", name: "foto", widget: "image", required: false }
              - { label: "URL/Link Eksternal", name: "url", widget: "string", required: false }
      
      - name: "galeri"
        label: "Galeri Foto"
        file: "data/galeri.json"
        description: "Foto-foto kegiatan KOPANA"
        fields:
          - name: "items"
            label: "Daftar Foto"
            widget: "list"
            fields:
              - { label: "Foto", name: "url", widget: "image" }
              - { label: "Judul/Deskripsi", name: "judul", widget: "string" }
              - { label: "Kategori", name: "kategori", widget: "string", default: "Kegiatan" }

      - name: "statistik"
        label: "Data Statistik"
        file: "data/statistik.json"
        description: "Angka statistik untuk KOPANA Dalam Angka"
        fields:
          - { label: "Jumlah Anggota Aktif", name: "anggota", widget: "number", default: 450 }
          - { label: "Tahun Berdiri", name: "tahun", widget: "number", default: 1996 }
          - { label: "Jumlah Pengurus", name: "pengurus", widget: "number", default: 3 }
          - { label: "Jumlah Pengawas", name: "pengawas", widget: "number", default: 3 }
          - { label: "Perwakilan Cabang", name: "cabang", widget: "number", default: 3 }
          - { label: "Karyawan", name: "karyawan", widget: "number", default: 11 }

  - name: "halaman"
    label: "Halaman Utama & Profil"
    files:
      - name: "beranda"
        label: "Teks Beranda & Sambutan"
        file: "data/beranda.json"
        fields:
          - { label: "Tampilkan Latar Belakang Foto", name: "tampilkan_foto_hero", widget: "boolean", default: false }
          - { label: "Foto Latar Belakang", name: "hero_bg", widget: "image", required: false }
          - { label: "Judul Utama", name: "hero_title", widget: "string" }
          - { label: "Sub Judul", name: "hero_subtitle", widget: "string" }
          - { label: "Deskripsi Singkat", name: "hero_desc", widget: "text" }
          - { label: "Nama Ketua", name: "ketua_nama", widget: "string" }
          - { label: "Foto Ketua", name: "ketua_foto", widget: "image" }
          - { label: "Teks Sambutan Paragraf 1", name: "sambutan_1", widget: "text" }
          - { label: "Teks Sambutan Paragraf 2", name: "sambutan_2", widget: "text" }

      - name: "profil"
        label: "Tentang Kami (Profil)"
        file: "data/profil.json"
        description: "Sejarah, Visi, Misi, dan Foto Utama Profil"
        fields:
          - { label: "Foto Utama Profil", name: "foto", widget: "image", required: false }
          - { label: "Angka Badge (Kotak Biru)", name: "badge_angka", widget: "string", default: "30+" }
          - { label: "Teks Badge (Kotak Biru)", name: "badge_teks", widget: "string", default: "Tahun Berkarya" }
          - { label: "Sejarah Paragraf 1", name: "sejarah_1", widget: "text" }
          - { label: "Sejarah Paragraf 2", name: "sejarah_2", widget: "text" }
          - { label: "Visi", name: "visi", widget: "text" }
          - name: "misi"
            label: "Daftar Misi"
            widget: "list"
            fields:
              - { label: "Teks Misi", name: "teks", widget: "string" }

      - name: "pengurus"
        label: "Struktur Organisasi (Pengurus & Pengawas)"
        file: "data/pengurus.json"
        fields:
          - name: "dewan_pengurus"
            label: "Dewan Pengurus"
            widget: "list"
            fields:
              - { label: "Nama", name: "nama", widget: "string" }
              - { label: "Jabatan", name: "jabatan", widget: "string" }
              - { label: "Foto", name: "foto", widget: "image", required: false }
          - name: "dewan_pengawas"
            label: "Dewan Pengawas"
            widget: "list"
            fields:
              - { label: "Nama", name: "nama", widget: "string" }
              - { label: "Jabatan", name: "jabatan", widget: "string" }
              - { label: "Foto", name: "foto", widget: "image", required: false }
          - name: "cabang"
            label: "Perwakilan Cabang"
            widget: "list"
            fields:
              - { label: "Nama Penanggung Jawab", name: "nama", widget: "string" }
              - { label: "Nama Cabang", name: "cabang", widget: "string" }
              - { label: "Foto", name: "foto", widget: "image", required: false }
              - { label: "Deskripsi", name: "desc", widget: "text" }

      - name: "kontak"
        label: "Informasi Kontak"
        file: "data/kontak.json"
        fields:
          - { label: "Alamat Lengkap", name: "alamat", widget: "string" }
          - { label: "No Telepon / WhatsApp", name: "telepon", widget: "string" }
          - { label: "Alamat Email", name: "email", widget: "string" }
          - { label: "Link Facebook", name: "facebook", widget: "string", required: false }
          - { label: "Link Instagram", name: "instagram", widget: "string", required: false }
          - { label: "Link YouTube", name: "youtube", widget: "string", required: false }
          - { label: "Link WhatsApp Langsung", name: "whatsapp", widget: "string" }
          - { label: "Google Maps Embed URL (Opsional)", name: "maps", widget: "string", required: false, hint: "Paste link 'src' dari Google Maps (https://www.google.com/maps/embed?...)" }

      - name: "formulir"
        label: "Pusat Unduhan (Dokumen)"
        file: "data/formulir.json"
        description: "Daftar formulir (PDF/Word/Excel) dan dokumen RAT/Laporan yang bisa diunduh"
        fields:
          - name: "items"
            label: "Daftar Dokumen"
            widget: "list"
            fields:
              - { label: "Kategori Dokumen", name: "kategori", widget: "select", options: ["Formulir", "Laporan Keuangan & RAT", "Dokumen Umum"], default: "Formulir" }
              - { label: "Judul Dokumen", name: "judul", widget: "string" }
              - { label: "File Dokumen", name: "file", widget: "file" }
      - name: "galeri"
        label: "Galeri Kegiatan"
        file: "data/galeri.json"
        description: "Kumpulan foto kegiatan KOPANA"
        fields:
          - name: "items"
            label: "Daftar Foto"
            widget: "list"
            fields:
              - { label: "Foto URL", name: "url", widget: "image" }
              - { label: "Judul Foto", name: "judul", widget: "string" }
              - { label: "Kategori", name: "kategori", widget: "string" }
      - name: "faq"
        label: "FAQ & Pertanyaan"
        file: "data/faq.json"
        description: "Daftar pertanyaan yang sering ditanyakan (FAQ)"
        fields:
          - name: "items"
            label: "Daftar Pertanyaan"
            widget: "list"
            fields:
              - { label: "Pertanyaan", name: "pertanyaan", widget: "string" }
              - { label: "Jawaban", name: "jawaban", widget: "text" }
