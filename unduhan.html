<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pusat Unduhan Dokumen - KOPANA Yogyakarta</title>
  <meta name="description" content="Unduh formulir pendaftaran, formulir pengunduran diri, laporan RAT, dan dokumen resmi lainnya dari KOPANA Yogyakarta.">
  <link rel="canonical" href="https://kopana.id/unduhan.html">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/logo-192.png">
  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-Avb2QiuDEEvB4bZJYdab9wBMeP6E5RQLmBeRNqRXE7Z9wLd0zBX8U2nqeAh8iWcLrVSt8U9bfEa7fm/LzO+g=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/style.css?v=132">

  <style>
    .faq-page-container {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 40px;
      background: var(--surface, rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border, rgba(255, 255, 255, 0.05));
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
    }
    .faq-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .faq-header h1 {
      color: var(--text, #1e293b);
      margin-bottom: 10px;
    }
    .faq-header p {
      color: var(--text-muted, #475569);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--primary, #2563eb);
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover {
      text-decoration: underline;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted, #64748b);
    }

    /* Formulir List Style */
    #dyn-formulir-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #dyn-formulir-container a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 20px;
      background: var(--bg-alt, #ffffff);
      border: 1px solid var(--border, #cbd5e1);
      border-radius: var(--radius-md);
      color: var(--text, var(--primary));
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    #dyn-formulir-container a:hover {
      background: var(--primary);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15,76,129,0.15);
    }

    #dyn-formulir-container a i {
      font-size: 1.5rem;
    }
  </style>

<script>
  // Bersihkan service worker lama milik pengunjung dari versi situs sebelumnya.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(function(regs) { regs.forEach(function(r) { r.unregister(); }); })
      .catch(function() {});
  }
</script>
</head>
<body>

  <!-- ANTI-FOUC DARK MODE -->
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('kopana-dark-mode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'true' || (saved === null && prefersDark)) {
          document.body.classList.add('dark-mode');
        }
      } catch (e) {}
    })();
  </script>

  <!-- Dark Toggle Button Absolut -->
  <button id="dark-toggle" class="dark-toggle" style="position: absolute; top: 20px; right: 20px; z-index: 1000;" aria-label="Ganti tema gelap/terang">
    <i id="dark-icon" class="fas fa-moon"></i>
  </button>

  <div class="faq-page-container">
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Halaman Utama</a>

    <div class="faq-header">
      <h1>Pusat Unduhan Dokumen</h1>
      <p>Pilih dan unduh formulir atau dokumen KOPANA yang Anda butuhkan.</p>
    </div>

    <div id="dyn-formulir-container">
      <div class="loading-state">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Memuat Daftar Unduhan...</p>
      </div>
    </div>
  </div>

  <script src="assets/js/script.js?v=135" defer></script>
</body>
</html>
